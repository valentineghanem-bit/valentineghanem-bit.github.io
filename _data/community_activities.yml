        caption: "Conducting point-of-care screening."
      - url: "/assets/img/community/agona-swedru-2024/screening-1.jpg"
        caption: "Blood glucose screening in progress."
        contain: true
      - url: "/assets/img/community/agona-swedru-2024/screening-2.jpg"
        caption: "Reviewing screening results with a participant."
        contain: true
      - url: "/assets/img/community/agona-swedru-2024/dispensing.jpg"
        caption: "Dispensing medication after consultation."
      - url: "/assets/img/community/agona-swedru-2024/ride-back.jpg"
        caption: "Heading back after the outreach."
  - title: "2023 Medical Screening – Kofikrom, Koforidua"
    provider: "Ghana Cocoa Board (COCOBOD)"
    format: "Nationwide Medical Screening Exercise"
    date: "21 October 2023"
    location: "Kofikrom, Koforidua, Eastern Region"
    lat: 6.12
    lng: -0.26
    description: "Participated in COCOBOD's regional health outreach improving access to healthcare services for cocoa farmers, including diagnostic and wellness services."
    photos:

medical_screening:
  - title: "2024 Medical Screening – Goaso"
    provider: "Ghana Cocoa Board (COCOBOD) – Cocoa Clinic Medical Team"
    format: "In-Person Health Outreach"
    date: "6 November 2024"
    location: "Goaso, Brong Ahafo Region"
    lat: 6.80
    lng: -2.51
    description: "Participated as part of the Cocoa Clinic team in a health screening exercise for cocoa farmers, aligning with national health objectives and UN SDGs 3, 8, 10 and 17."
    video: "/assets/video/goaso-2024-screening.mp4"
        video_duration: "PT13S"
        video_landscape: true
    photos:

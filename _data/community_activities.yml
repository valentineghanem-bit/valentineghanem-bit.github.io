  - title: "2020 Technical Training"
    provider: "Ghana Health Service (GHS)"
    format: "In-Person, Adabraka Polyclinic, Accra"
    date: "18 January 2020"
    lat: 5.56
    lng: -0.21
    description: "National TB Control Training — hands-on training in TB sample collection, Ziehl-Neelsen staining, AFB microscopy, and diagnostic workflow under national TB protocols."
    photos:
      - url: "/assets/img/community/tb-seminar-2020/seminar-1.jpg"
        caption: "National TB Control training session."
      - url: "/assets/img/community/tb-seminar-2020/seminar-2.jpg"
        caption: "Hands-on AFB microscopy training."
      - url: "/assets/img/community/tb-seminar-2020/seminar-3.jpg"
        caption: "Reviewing TB diagnostic workflow with colleagues."

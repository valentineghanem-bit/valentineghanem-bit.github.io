  - title: "2024 Medical Screening – Agona Swedru"
    provider: "Ghana Cocoa Board (COCOBOD) – Cocoa Clinic"
    format: "In-Person Health Screening"
    date: "19 October 2024"
    location: "Agona West Municipal, Central Region"
    lat: 5.54
    lng: -0.70
    description: "Supported a public health screening for SPD staff and cocoa farmers covering malaria, diabetes, obesity, breast cancer, HIV and general wellness, with free physician consultation and medication."
    video: "/assets/video/agona-swedru-2024-screening.mp4"
        video_duration: "PT32S"
        video_landscape: true
    photos:
      - url: "/assets/img/community/agona-swedru-2024/group-pic.jpg"
        caption: "The Cocoa Clinic screening team at Agona Swedru."

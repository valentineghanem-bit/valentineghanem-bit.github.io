statement_of_purpose: >
  I intend to pursue a career at the junction of diagnostic medicine and public health systems, supporting evidence-based approaches. I am also dedicated to transforming the lessons gleaned from the laboratory into actionable insights that can be utilized to respond promptly and enhance disease surveillance. This is why I find fulfillment in being both an academic researcher and a clinician: my goal is to integrate essential clinical data with the realities of the public health system.
career_vision: >
  I anticipate leading initiatives to harmonize biomedical science, data science, and policy to advance health equity in Africa. I aspire to contribute to a future in which proactive epidemic response plans and sustainable health systems, particularly in resource-limited settings, benefit from the combination of predictive modeling, digital health technologies, and focused interventions.
aim: >
  To bridge the gap between clinical diagnostic medicine and public health systems in Africa by leveraging data science and digital health technologies to build proactive, equitable, and evidence-based disease surveillance and epidemic response frameworks.
objectives:
  - "Translate laboratory insights: establish robust mechanisms that convert raw, laboratory-derived diagnostic data into actionable, real-time insights for public health surveillance systems."
  - "Deploy digital health & predictive tools: design, evaluate, or implement predictive modeling tools and digital health technologies optimized for early epidemic detection and response in resource-limited settings."
  - "Harmonize policy and science: collaborate with policymakers and stakeholders to integrate biomedical data science into national and regional health policies."
  - "Advance health equity: design targeted, data-driven interventions that address systemic health disparities across diverse African populations."
  - "Bridge the clinician-researcher divide: maintain a dual role as clinician and academic researcher, using frontline clinical realities to inform rigorous, system-level public health research."

# Studio and posed professional photography (distinct from candid Google Sites
# event photos in gallery_photos.yml). Shown as a second carousel on the
# Gallery page and as the hero's floating photo-web captions.
# Captions below were rewritten after direct feedback that most were wrong --
# re-verified by opening every image file in this list, one at a time, and
# describing only what is actually visible in THAT file (shirt colour/pattern,
# setting, activity). The on-disk filenames remain unreliable (many describe
# a different photo than the one at that path -- e.g. "-maroon-shirt" is
# actually a solid blue shirt in a mall hallway) and were NOT used as a
# source of truth this pass. Original Google Sites captions, if they differed
# from these, could not be recovered: no EXIF/IPTC metadata survives in these
# files, repo history has no earlier version of this data (this mismatch
# predates the first commit), and the local reference folders contain only
# unrelated design mood-board images, not a Sites export. If a Takeout
# archive or export surfaces later, reconcile against it.

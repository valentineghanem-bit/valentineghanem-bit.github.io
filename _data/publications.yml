- title: "Spatial and Machine Learning Analysis of District-Level Health Insurance Inequities in Ghana"
  journal: "Cureus"
  year: 2026
  citation: "Ghanem, V. G. (2026). Spatial and Machine Learning Analysis of District-Level Health Insurance Inequities in Ghana. Cureus, 18(1): e101984."
  doi_url: "https://doi.org/10.7759/cureus.101984"
  status: "Published"
  summary: "Examines NHIS non-enrolment across 261 districts in Ghana using spatial analysis (Bivariate LISA) and machine learning (CART). District-level illiteracy emerged as the strongest predictor of uninsurance, outweighing poverty and population density. Forty-two high-risk districts, concentrated in the northern belt, highlight geographic and institutional access barriers."
- title: "HIV Prognosis in Sub-Saharan Africa: A Narrative Review of Mortality Trends, Structural Determinants, and Policy Implications"
  journal: "International Journal of Medical and Health Research"
  year: 2025
  citation: "Ghanem, V. G. (2025). HIV Prognosis in Sub-Saharan Africa: A Narrative Review of Mortality Trends, Structural Determinants, and Policy Implications. International Journal of Medical and Health Research, 3(2)."
  doi_url: "https://doi.org/10.61424/ijmhr.v3i2.346"
  status: "Published"
  summary: "A narrative synthesis of 218 peer-reviewed studies (2015–2024) examining HIV-related mortality trends in Sub-Saharan Africa, emphasizing structural determinants and highlighting the underutilization of behavioral and biomedical predictors."
- title: "Socio-Behavioral and Spatial Determinants of HIV/AIDS Incidence in Ghana: An Ecological Cross-Sectional Study with Explainable Machine Learning"
  journal: "Advances in Infectious Diseases"
  year: 2025
  citation: "Ghanem, V. G. (2025). Socio-Behavioral and Spatial Determinants of HIV/AIDS Incidence in Ghana: An Ecological Cross-Sectional Study with Explainable Machine Learning. Advances in Infectious Diseases."

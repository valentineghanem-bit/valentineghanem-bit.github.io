<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!--
    Abstract "VG": the V is two solid rounded bars (a clean, legible
    diagonal letterform); the G is a broken ring with a short inward bar
    at its gap, the same minimalist trick many wordmarks use for a G.
    Held to 4 flat colours total this time, no gradients, no background.
  -->
  <!-- V: left bar (crimson) + right bar (violet) -->
  <rect x="13" y="8" width="13" height="38" rx="6.5" fill="#ff5a66" transform="rotate(-22 19.5 27)"/>
  <rect x="33" y="8" width="13" height="38" rx="6.5" fill="#b57cff" transform="rotate(22 39.5 27)"/>
  <!-- accent circle on the left arm (cyan) -->
  <circle cx="18" cy="20" r="6" fill="#00c5d5"/>

  <!-- G: broken ring + inward bar (mint), sitting at the V's own vertex -->
  <circle cx="32" cy="49" r="9" fill="none" stroke="#00fcc1" stroke-width="4.5" stroke-linecap="round" stroke-dasharray="40 16.6" stroke-dashoffset="-6"/>
  <rect x="31.5" y="45.5" width="8" height="4.5" rx="2" fill="#00fcc1"/>
</svg>

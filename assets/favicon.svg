<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!--
    Abstract V: each arm is a solid rounded bar (a clean, unbroken diagonal
    stroke so the letterform reads clearly), with smaller circular accents
    overlaid in the remaining palette colours, applying the same idea
    Figma's own mark uses: a letterform read from a small stack of flat
    colour pieces, in a shape vocabulary that still holds together at 16px.
  -->
  <!-- Left arm: crimson bar, violet + cyan accents -->
  <rect x="15" y="8" width="14" height="40" rx="7" fill="#ff5a66" transform="rotate(-24 22 28)"/>
  <circle cx="19" cy="21" r="7.5" fill="#b57cff"/>
  <circle cx="27.5" cy="40" r="7" fill="#00c5d5"/>

  <!-- Right arm: egg-yellow bar, mint + white accents -->
  <rect x="35" y="8" width="14" height="40" rx="7" fill="#efbd00" transform="rotate(24 42 28)"/>
  <circle cx="45" cy="21" r="7.5" fill="#00fcc1"/>
  <circle cx="36.5" cy="40" r="7" fill="#ffffff" stroke="#0d1220" stroke-width="1.5"/>
</svg>

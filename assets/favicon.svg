<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="v2-favicon-left-arm" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#ff5a66"/>
      <stop offset="45%" stop-color="#b57cff"/>
      <stop offset="100%" stop-color="#00c5d5"/>
    </linearGradient>
    <linearGradient id="v2-favicon-right-arm" x1="1" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#efbd00"/>
      <stop offset="45%" stop-color="#00fcc1"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
    <filter id="v2-favicon-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="64" height="64" rx="14" fill="#07090f"/>
  <rect width="64" height="64" rx="14" fill="none" stroke="rgba(0,197,213,0.18)" stroke-width="1"/>

  <!-- Left arm of V: crimson -> violet -> cyan -->
  <polygon points="10,10 22,10 36,50 24,50" fill="url(#v2-favicon-left-arm)" filter="url(#v2-favicon-glow)" opacity="0.97"/>
  <!-- Right arm of V: egg yellow -> mint -> white -->
  <polygon points="54,10 42,10 28,50 40,50" fill="url(#v2-favicon-right-arm)" filter="url(#v2-favicon-glow)" opacity="0.97"/>

  <polygon points="32,48 26,28 32,34 38,28" fill="#ffffff" opacity="0.18"/>

  <circle cx="12" cy="12" r="2.2" fill="#00c5d5" opacity="0.85"/>
  <circle cx="52" cy="12" r="2.2" fill="#ff5a66" opacity="0.85"/>
  <circle cx="32" cy="52" r="2.2" fill="#b57cff" opacity="0.85"/>
</svg>

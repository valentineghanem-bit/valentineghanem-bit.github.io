<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% if page.browser_title %}{{ page.browser_title }}{% elsif page.title %}{{ page.title }} | {{ site.data.profile.name }}{% else %}{{ site.data.profile.name }}{% endif %}</title>
<meta name="description" content="{{ page.description | default: site.data.profile.short_description | strip_newlines }}">
<link rel="canonical" href="{{ page.url | absolute_url }}">
<link rel="icon" href="{{ '/favicon.svg?v=20260723-g6' | relative_url }}" type="image/svg+xml">
<link rel="icon" href="{{ '/favicon.ico?v=20260723-g6' | relative_url }}" sizes="any" type="image/x-icon">
<link rel="shortcut icon" href="{{ '/favicon.ico?v=20260723-g6' | relative_url }}" type="image/x-icon">
<link rel="icon" href="{{ '/assets/icons/favicon-16x16.png?v=20260723-g6' | relative_url }}" type="image/png" sizes="16x16">
<link rel="icon" href="{{ '/assets/icons/favicon-32x32.png?v=20260723-g6' | relative_url }}" type="image/png" sizes="32x32">
<link rel="apple-touch-icon" href="{{ '/apple-touch-icon.png?v=20260723-g6' | relative_url }}">
<link rel="manifest" href="{{ '/site.webmanifest?v=20260723-g6' | relative_url }}">
<meta name="theme-color" content="#0B1120">

<!-- Open Graph -->
<meta property="og:type" content="website">
<meta property="og:title" content="{% if page.title %}{{ page.title }} | {% endif %}{{ site.data.profile.name }}">
<meta property="og:description" content="{{ page.description | default: site.data.profile.short_description | strip_newlines }}">
<meta property="og:url" content="{{ page.url | absolute_url }}">
<meta property="og:site_name" content="{{ site.data.profile.name }}">
<meta property="og:image" content="{{ '/assets/img/knowledge-panel/portrait-studio-square.jpg' | absolute_url }}">
<meta property="og:image:width" content="1086">
<meta property="og:image:height" content="1086">

<!-- X / Twitter card -->
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="{% if page.title %}{{ page.title }} | {% endif %}{{ site.data.profile.name }}">
<meta name="twitter:description" content="{{ page.description | default: site.data.profile.short_description | strip_newlines }}">
<meta name="twitter:image" content="{{ '/assets/img/knowledge-panel/portrait-studio-square.jpg' | absolute_url }}">

<link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
<link rel="stylesheet" href="{{ '/assets/css/v2-tokens.css' | relative_url }}">
<link rel="stylesheet" href="{{ '/assets/css/hero-v2.css' | relative_url }}">
<link rel="stylesheet" href="{{ '/assets/css/home-v2.css' | relative_url }}">
<link rel="stylesheet" href="{{ '/assets/css/map-v2.css' | relative_url }}">
<link rel="stylesheet" href="{{ '/assets/css/about-v2.css' | relative_url }}">
<link rel="stylesheet" href="{{ '/assets/css/skills-v2.css' | relative_url }}">
<link rel="stylesheet" href="{{ '/assets/css/publications-v2.css' | relative_url }}">
<link rel="stylesheet" href="{{ '/assets/css/portfolio-v2.css' | relative_url }}">
<link rel="stylesheet" href="{{ '/assets/css/certificates-v2.css' | relative_url }}">
<link rel="stylesheet" href="{{ '/assets/css/community-v2.css' | relative_url }}">
<link rel="stylesheet" href="{{ '/assets/css/gallery-v2.css' | relative_url }}">
<link rel="stylesheet" href="{{ '/assets/css/press-v2.css' | relative_url }}">
<link rel="stylesheet" href="{{ '/assets/css/v2-toolbar.css' | relative_url }}">
<link rel="stylesheet" href="{{ '/assets/css/fan-carousel.css' | relative_url }}">
<link rel="stylesheet" href="{{ '/assets/css/gallery-morph.css' | relative_url }}">
<link rel="stylesheet" href="{{ '/assets/css/site-chrome-v2.css' | relative_url }}">
<link rel="stylesheet" href="{{ '/assets/css/cursor.css?v=20260723-g6' | relative_url }}">
<script src="{{ '/assets/js/vendor/gsap.min.js' | relative_url }}" defer></script>
<script src="{{ '/assets/js/vendor/ScrollTrigger.min.js' | relative_url }}" defer></script>
<script src="{{ '/assets/js/site.js' | relative_url }}" defer></script>
<script src="{{ '/assets/js/canvas-field.js' | relative_url }}" defer></script>
<script src="{{ '/assets/js/v2-motion.js' | relative_url }}" defer></script>
<script src="{{ '/assets/js/v2-toolbar.js?v=20260723-g6' | relative_url }}" defer></script>
<script src="{{ '/assets/js/cursor.js?v=20260723-g6' | relative_url }}" defer></script>

<!-- Structured data (JSON-LD) -- lives directly in the page's real <head>,
     not inside an embedded/sandboxed iframe. This is the whole point. -->
{% if page.jsonld == "home" %}
  {% include jsonld/home.html %}
{% elsif page.jsonld == "about" %}
  {% include jsonld/about.html %}
{% elsif page.jsonld == "community" %}
  {% include jsonld/community.html %}
{% elsif page.jsonld == "gallery" %}
  {% include jsonld/gallery.html %}
{% else %}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@graph": [
    {
      "@type": "WebPage",
      "@id": "{{ page.url | absolute_url }}#webpage",
      "url": "{{ page.url | absolute_url }}",
      "name": {% if page.title %}"{{ page.title }} | {{ site.data.profile.name }}"{% else %}{{ site.data.profile.name | jsonify }}{% endif %},
      "description": {{ page.description | default: site.data.profile.short_description | strip_newlines | jsonify }},
      "isPartOf": { "@id": "{{ site.url }}/#website" },
      "about": { "@id": "{{ site.url }}/#person" },
      "inLanguage": "en"
    }
  ]
}
</script>
{% endif %}

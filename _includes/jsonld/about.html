{%- assign rep_img = site.data.images | where: "representative", true | first -%}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@graph": [
    {
      "@type": "ProfilePage",
      "@id": "{{ site.url }}/about/#profilepage",
      "url": "{{ site.url }}/about/",
      "name": "About {{ site.data.profile.name }}",
      "headline": "{{ site.data.profile.name }} — Biography and Professional Profile",
      "description": {{ site.data.profile.disambiguating_description | strip_newlines | jsonify }},
      "isPartOf": { "@id": "{{ site.url }}/#website" },
      "mainEntity": { "@id": "{{ site.url }}/#person" },
      "about": { "@id": "{{ site.url }}/#person" },
      "primaryImageOfPage": { "@id": {{ rep_img.id_url | jsonify }} },
      "breadcrumb": { "@id": "{{ site.url }}/about/#breadcrumb" },
      "inLanguage": "en"
    },
    {
      "@type": "BreadcrumbList",
      "@id": "{{ site.url }}/about/#breadcrumb",
      "itemListElement": [
        { "@type": "ListItem", "position": 1, "name": "Home", "item": "{{ site.url }}/" },
        { "@type": "ListItem", "position": 2, "name": "About {{ site.data.profile.name }}", "item": "{{ site.url }}/about/" }
      ]
    },
    {% include jsonld/person-node.html %},
    {% include jsonld/image-nodes.html %},
    {% include jsonld/organization-node.html %}
  ]
}
</script>

<footer class="site-footer">
  <div class="wrap site-footer__row">
    <p class="site-footer__copy">© {{ 'now' | date: "%Y" }} {{ site.data.profile.name }}. All rights reserved.</p>
    <ul class="site-footer__icons">
      {% for icon in site.data.social.icons %}
      <li><a href="{{ icon.url }}" aria-label="{{ icon.label }}" rel="me noopener" target="_blank">{{ icon.label }}</a></li>
      {% endfor %}
    </ul>
  </div>
</footer>
